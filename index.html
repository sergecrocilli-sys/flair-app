<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>FLAIR</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h1>🔥 FLAIR</h1>
  <h2>Détecteur de Signaux Commerciaux</h2>

  <!-- AUTH -->
  <div id="auth">
    <input id="email" placeholder="Email" />
    <input id="password" type="password" placeholder="Mot de passe" />
    <button onclick="signUp()">Créer mon compte</button>
    <button onclick="signIn()">Se connecter</button>
  </div>

  <!-- APP -->
  <div id="app" style="display:none;">
  <button onclick="logout()">Se déconnecter</button>

  <div class="dashboard-grid">

    <section class="dashboard-card">
      <h3>🔥 Top 3 du jour</h3>
      <button onclick="chargerTop3()">Actualiser le Top 3</button>
      <div id="top3"></div>
    </section>

    <section class="dashboard-card">
      <h3>📌 À contacter</h3>
      <div id="aContacter"></div>
    </section>

    <section class="dashboard-card">
      <h3>➕ Ajouter un signal</h3>
      <input id="titre" placeholder="Titre du signal" />
      <input id="entreprise" placeholder="Entreprise" />
      <button onclick="ajouterSignal()">Ajouter</button>
    </section>

  </div>

  <section class="dashboard-card signaux-large">
    <h3>📂 Tous les signaux actifs</h3>

    <div class="actions-row">
      <button onclick="chargerSignaux()">🔄 Rafraîchir</button>
      <button onclick="analyserNouveauxSignaux()">🧠 Analyser</button>
    </div>

    <div id="signaux"></div>
  </section>
</div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>

</body>
</html>
